<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Indicator tree — Australian Immigration Data</title>
  <link rel="icon" href="logo_immi_data_square_black_write.png?v=4" type="image/png" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f0f4f8;
      --text: #2d3748;
      --text-muted: #4a5568;
      --accent: #2563eb;
      --header-bg: rgba(219, 234, 254, 0.92);
      --header-title: #1e40af;
      --header-subtitle: #6b7280;
      --border: rgba(0,0,0,0.08);
      --surface: rgba(255,255,255,0.9);
    }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg);
      background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 248, 255, 0.95) 50%, rgba(230, 240, 252, 0.9) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      max-width: 1920px;
      margin: 0 auto;
      padding: 0 0.75rem 0.2rem;
    }
    @media (max-width: 768px) {
      .page { padding: 0.3rem 0.5rem 0.2rem; }
    }
    @media (max-width: 480px) {
      .page { padding: 0.2rem 0.3rem 0.12rem; }
    }
    .wrap { max-width: 900px; margin: 0; padding: 1rem 0; }
    header {
      min-height: 5.25rem;
      padding: 0.36rem 0.54rem;
      border-radius: 0 0 8px 8px;
      background: var(--header-bg);
      border: none;
      border-bottom: 3px solid var(--accent);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.675rem;
      position: relative;
    }
    header .header-logo-left {
      flex-shrink: 0;
      display: block;
      line-height: 0;
      margin-left: -0.5rem;
      position: relative;
    }
    header .header-logo-left img {
      height: 5rem;
      width: auto;
      display: block;
      transition: opacity 0.2s ease;
    }
    header .header-logo-left .logo-hover {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    header .header-logo-left:hover .logo-default { opacity: 0; }
    header .header-logo-left:hover .logo-hover { opacity: 1; }
    header .header-left-group {
      display: flex;
      align-items: center;
      gap: 0.225rem;
      min-width: 0;
      flex: 1;
    }
    header .header-text { min-width: 0; }
    header h1 {
      font-family: 'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 0.11rem 0;
      padding: 0.18rem 0.36rem;
      letter-spacing: -0.02em;
      color: var(--header-title);
      -webkit-text-stroke: 0.5px var(--header-title);
      border-radius: 6px;
      transition: color 0.2s ease, -webkit-text-stroke 0.2s ease;
    }
    header h1:hover {
      color: #000;
      -webkit-text-stroke: 0.5px #000;
    }
    header .subtitle {
      font-size: 0.7rem;
      color: var(--header-subtitle);
      margin: 0;
    }
    header .subtitle a { color: #2563eb; text-decoration: none; }
    header .subtitle a:hover { text-decoration: underline; }
    header .header-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      font-weight: 500;
      color: #1a1a1a;
    }
    header .header-nav a {
      color: #1a1a1a;
      text-decoration: none;
      padding: 0 0.5rem;
    }
    header .header-nav a:hover { color: var(--accent); text-decoration: underline; }
    header .header-nav a.current { font-weight: 700; }
    header .header-nav .nav-icon { width: 1em; height: 1em; vertical-align: -0.15em; margin-right: 0.25em; fill: currentColor; }
    header .header-nav .sep {
      display: inline-block;
      width: 1px;
      height: 0.85em;
      background: #1a1a1a;
      opacity: 0.6;
      flex-shrink: 0;
      margin: 0 0.15rem;
      user-select: none;
    }
    header { overflow: visible; }
    header .header-logo-link {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      text-decoration: none;
      line-height: 0;
      display: block;
      overflow: visible;
    }
    header .header-logo-link img,
    header .header-logo {
      height: 14.08rem !important;
      min-height: 226px;
      width: auto !important;
      max-width: 500px;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
      transition: opacity 0.2s ease;
    }
    header .header-logo-link .logo-hover {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
    }
    header .header-logo-link:hover .logo-default,
    header .header-logo-link:hover .header-logo.logo-default { opacity: 0; }
    header .header-logo-link:hover .logo-hover { opacity: 1; }
    @media (max-width: 768px) {
      header { padding: 0.35rem 0.45rem; flex-wrap: wrap; gap: 0.4rem; }
      header h1 { font-size: 1.35rem; }
      header .header-logo-left img { height: 3.5rem; }
      header .header-logo-link { display: none; }
    }
    @media (max-width: 480px) {
      header { padding: 0.25rem 0.35rem; }
      header h1 { font-size: 1.05rem; }
      header .subtitle { font-size: 0.6rem; }
      header .header-logo-left img { height: 2.5rem; }
      header .header-left-group { gap: 0.15rem; }
      header .header-logo-link { display: none; }
    }
    .tree { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem; }
    .tree details { margin: 0.15rem 0; }
    .tree summary {
      cursor: pointer;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .tree summary::-webkit-details-marker { display: none; }
    .tree summary::before { content: '▶'; font-size: 0.65rem; transition: transform 0.15s; }
    .tree details[open] > summary::before { transform: rotate(90deg); }
    .tree summary:hover { background: rgba(37,99,235,0.08); }
    .tree .section summary { color: var(--accent); }
    .tree .table summary { padding-left: 1.25rem; font-weight: 500; font-size: 0.85rem; }
    .tree .submenu summary { padding-left: 2rem; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); }
    .tree .indicator-list { padding-left: 2.5rem; margin: 0.25rem 0; list-style: none; }
    .tree .indicator-list li { margin: 0.15rem 0; }
    .tree .indicator-list a {
      display: inline-block;
      padding: 0.2rem 0.4rem;
      font-size: 0.8rem;
      color: var(--text);
      text-decoration: none;
      border-radius: 4px;
    }
    .tree .indicator-list a:hover { background: rgba(37,99,235,0.1); color: var(--accent); }
    .count { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); }
    .loading { padding: 1rem; color: var(--text-muted); }
    .error { padding: 1rem; color: #b91c1c; }
    .search-wrap { margin-bottom: 1rem; }
    .search-wrap input {
      width: 100%;
      max-width: 400px;
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
    }
    .search-wrap input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
    .search-wrap input::placeholder { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="page">
  <header>
    <div class="header-left-group">
      <a href="index.html" class="header-logo-left" aria-label="Back to Dashboard" title="Back to Dashboard"><img class="logo-default" src="logo_immi_data_square_black_write.png" alt="IMMI-DATA"><img class="logo-hover" src="logo_immi_data_squera_plate.png" alt="IMMI-DATA" aria-hidden="true"></a>
      <div class="header-text">
        <h1>Australian Immigration — Tree options</h1>
        <p class="subtitle">7 sections · 46 tables · 577 indicators · <a href="index.html">Dashboard</a></p>
      </div>
    </div>
    <nav class="header-nav" aria-label="Site navigation">
      <a href="tree.html" class="current">Indicator Tree</a><span class="sep" aria-hidden="true"></span><a href="documentation.html">Documentation</a><span class="sep" aria-hidden="true"></span><a href="https://github.com/Jfilhorv/IMMI_DATA" target="_blank" rel="noopener noreferrer" title="Repository"><svg class="nav-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg> Git</a>
    </nav>
    <a href="index.html" class="header-logo-link" aria-label="Back to Dashboard"><img src="logo_immi_data.png" alt="IMMI-DATA" class="header-logo logo-default"><img src="immi_data_logo_plate.png" alt="IMMI-DATA" class="header-logo logo-hover" aria-hidden="true"></a>
  </header>
  <div class="wrap">
    <p class="meta" id="meta">7 sections · 46 tables · 577 indicators</p>
    <div class="search-wrap">
      <input type="text" id="tree-search" placeholder="Search sections, tables, indicators…" aria-label="Filter tree">
    </div>
    <div id="tree-root" class="tree">
      <p class="loading" id="loading">Loading…</p>
    </div>
  </div>
  </div>
  <script>
(function () {
  'use strict';
  var base = (function () {
    var href = window.location.href;
    var last = href.lastIndexOf('/');
    return last >= 0 ? href.slice(0, last + 1) : '';
  })();
  var TABLES_URL = base + 'data/tables.json?v=1';
  var DATA_URL = base + 'data/indicators.csv?v=1';
  var SECTION_LABELS = {
    1: '1. Permanent migration',
    2: '2. Temporary visas',
    3: '3. Humanitarian Program',
    4: '4. Visa cancellations & departures',
    5: '5. Net Overseas Migration',
    6: '6. Citizenship',
    7: '7. Labour market'
  };

  function parseCSVLine(line) {
    var out = [], i = 0;
    while (i < line.length) {
      if (line[i] === '"') {
        i++;
        var s = '';
        while (i < line.length && line[i] !== '"') { s += line[i]; i++; }
        if (line[i] === '"') i++;
        out.push(s.trim());
      } else {
        var s = '';
        while (i < line.length && line[i] !== ',') { s += line[i]; i++; }
        out.push(s.trim());
        if (line[i] === ',') i++;
      }
    }
    return out;
  }

  function buildTree(tables, csvText) {
    var lines = csvText.trim().split(/\r?\n/);
    if (lines.length < 2) return { sections: {}, totalIndicators: 0 };
    var header = parseCSVLine(lines[0]);
    var tableIdx = header.indexOf('table');
    var indIdx = header.indexOf('indicator');
    if (tableIdx < 0 || indIdx < 0) return { sections: {}, totalIndicators: 0 };
    var tableToIndicators = {};
    for (var i = 1; i < lines.length; i++) {
      var row = parseCSVLine(lines[i]);
      if (row.length <= Math.max(tableIdx, indIdx)) continue;
      var table = (row[tableIdx] || '').trim();
      var ind = (row[indIdx] || '').trim();
      if (!table || !ind) continue;
      if (!tableToIndicators[table]) tableToIndicators[table] = {};
      if (ind.indexOf(' | ') >= 0) {
        var parts = ind.split(' | ');
        var sub = (parts[0] || '').trim();
        var name = (parts.slice(1).join(' | ') || '').trim();
        if (!tableToIndicators[table][sub]) tableToIndicators[table][sub] = [];
        if (tableToIndicators[table][sub].indexOf(name) < 0) tableToIndicators[table][sub].push(name);
      } else {
        if (!tableToIndicators[table]['']) tableToIndicators[table][''] = [];
        if (tableToIndicators[table][''].indexOf(ind) < 0) tableToIndicators[table][''].push(ind);
      }
    }
    var sections = {};
    var totalIndicators = 0;
    tables.forEach(function (t) {
      var sid = t.section;
      if (!sections[sid]) sections[sid] = { label: SECTION_LABELS[sid] || ('Section ' + sid), tables: [] };
      var indBySub = tableToIndicators[t.id] || { '': [] };
      var flat = [];
      Object.keys(indBySub).sort().forEach(function (sub) {
        (indBySub[sub] || []).sort(function (a, b) { return a.toLowerCase().localeCompare(b.toLowerCase()); }).forEach(function (name) {
          flat.push({ submenu: sub, name: name, full: sub ? sub + ' | ' + name : name });
        });
      });
      totalIndicators += flat.length;
      sections[sid].tables.push({ id: t.id, shortTitle: t.shortTitle || t.title, indicators: flat });
    });
    return { sections: sections, totalIndicators: totalIndicators };
  }

  function escapeHtml(s) {
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function filterTree(tree, query) {
    if (!query) return tree;
    var q = query.toLowerCase().trim();
    if (!q) return tree;
    var out = { sections: {}, totalIndicators: 0 };
    [1, 2, 3, 4, 5, 6, 7].forEach(function (sid) {
      var sec = tree.sections[sid];
      if (!sec) return;
      var tablesOut = [];
      sec.tables.forEach(function (tbl) {
        var indicatorsOut = tbl.indicators.filter(function (ind) {
          var text = (sec.label + ' ' + tbl.shortTitle + ' ' + ind.name + ' ' + (ind.submenu || '')).toLowerCase();
          return text.indexOf(q) >= 0;
        });
        if (indicatorsOut.length) {
          tablesOut.push({ id: tbl.id, shortTitle: tbl.shortTitle, indicators: indicatorsOut });
          out.totalIndicators += indicatorsOut.length;
        }
      });
      if (tablesOut.length) out.sections[sid] = { label: sec.label, tables: tablesOut };
    });
    return out;
  }

  function render(tree, openAll) {
    var root = document.getElementById('tree-root');
    var meta = document.getElementById('meta');
    if (!tree.totalIndicators) {
      root.innerHTML = '<p class="error">No matches.</p>';
      meta.textContent = '0 sections · 0 tables · 0 indicators';
      return;
    }
    var sectionCount = Object.keys(tree.sections).length;
    var tableCount = 0;
    Object.keys(tree.sections).forEach(function (sid) { tableCount += tree.sections[sid].tables.length; });
    meta.textContent = sectionCount + ' sections · ' + tableCount + ' tables · ' + tree.totalIndicators + ' indicators';
    var html = '';
    [1, 2, 3, 4, 5, 6, 7].forEach(function (sid) {
      var sec = tree.sections[sid];
      if (!sec || !sec.tables.length) return;
      var openAttr = openAll ? ' open' : '';
      html += '<details class="section"' + openAttr + '><summary><span>' + escapeHtml(sec.label) + '</span> <span class="count">' + sec.tables.length + ' tables</span></summary>';
      sec.tables.forEach(function (tbl) {
        html += '<details class="table"' + openAttr + '><summary><span>' + escapeHtml(tbl.shortTitle) + '</span> <span class="count">' + tbl.indicators.length + ' indicators</span></summary>';
        var bySub = {};
        tbl.indicators.forEach(function (ind) {
          var sub = ind.submenu || '\u200b';
          if (!bySub[sub]) bySub[sub] = [];
          bySub[sub].push(ind);
        });
        var subKeys = Object.keys(bySub).sort();
        subKeys.forEach(function (sub) {
          var list = bySub[sub];
          if (sub === '\u200b') {
            html += '<ul class="indicator-list">';
            list.forEach(function (ind) {
              var href = 'index.html?table=' + encodeURIComponent(tbl.id) + '&indicator=' + encodeURIComponent(ind.full);
              html += '<li><a href="' + href + '">' + escapeHtml(ind.name) + '</a></li>';
            });
            html += '</ul>';
          } else {
            html += '<details class="submenu"' + openAttr + '><summary>' + escapeHtml(sub) + ' <span class="count">' + list.length + '</span></summary><ul class="indicator-list">';
            list.forEach(function (ind) {
              var href = 'index.html?table=' + encodeURIComponent(tbl.id) + '&indicator=' + encodeURIComponent(ind.full);
              html += '<li><a href="' + href + '">' + escapeHtml(ind.name) + '</a></li>';
            });
            html += '</ul></details>';
          }
        });
        html += '</details>';
      });
      html += '</details>';
    });
    root.innerHTML = html;
  }

  var fullTree = null;
  var searchEl = document.getElementById('tree-search');

  function onSearch() {
    var q = (searchEl && searchEl.value) ? searchEl.value.trim() : '';
    if (!fullTree) return;
    if (!q) {
      render(fullTree, false);
      return;
    }
    var filtered = filterTree(fullTree, q);
    render(filtered, true);
  }

  document.getElementById('loading').textContent = 'Loading…';
  Promise.all([
    fetch(TABLES_URL).then(function (r) { if (!r.ok) throw new Error('tables'); return r.json(); }),
    fetch(DATA_URL).then(function (r) { if (!r.ok) throw new Error('data'); return r.text(); })
  ]).then(function (res) {
    var tables = res[0];
    var csvText = res[1];
    if (!Array.isArray(tables)) throw new Error('Invalid tables');
    fullTree = buildTree(tables, csvText);
    render(fullTree, false);
    if (searchEl) searchEl.addEventListener('input', onSearch);
  }).catch(function (err) {
    document.getElementById('tree-root').innerHTML = '<p class="error">Failed to load data: ' + escapeHtml(err.message || 'error') + '</p>';
  });
})();
  </script>
</body>
</html>
